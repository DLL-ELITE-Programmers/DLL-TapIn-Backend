<!doctype html>
<html>
  <head>
    <title>Welcome</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        user-select: none;
        box-sizing: border-box;
        border: none;
        outline: none;
      }
      .main {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        height: 100dvh;
        width: 100dvw;
        overflow: hidden;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;

        > div {
          display: flex;
          flex-direction: row;
          flex-wrap: wrap;
          align-items: start;
          justify-content: center;
          gap: 1.5rem;
          width: 100%;
        }
      }
      .card {
        display: flex;
        flex-direction: column;
        box-shadow: 3px 3px 5px #aaaaaa;
        padding: 0.5rem;
        border-radius: 0.25rem;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 1rem;
        min-width: 45%;
        max-height: 45%;
        overflow: auto;

        .title {
          color: #6060ff;
        }

        ol {
          display: flex;
          flex-direction: column;
          flex-wrap: wrap;

          li {
            text-align: left;
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div>
        <div class="card">
          <h3 class="title">DLL Tap-In Developers</h3>
          <ol>
            <li>Barry Adam Adam</li>
            <li>Kurt Cyrus Atoat</li>
            <li>Peter Paul Eclavea</li>
            <li>Bernard Gabito</li>
            <li>Rogemson Molina</li>
            <li>Ryann Kim Sesgundo</li>
          </ol>
        </div>
        <div class="card">
          <h3 class="title">Ethical and Security Team</h3>
          <ol>
            <li>Carlos Ragudo</li>
            <li>Terrence Martin Terrega</li>
          </ol>
        </div>
      </div>
    </div>
  </body>
</html>
