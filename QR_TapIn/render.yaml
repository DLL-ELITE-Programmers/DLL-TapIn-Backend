databases:
  - name: testpostgresql
    plan: free
    databaseName: QR_TapIn
    user: RyannKim327

services:
  - type: web
    plan: free
    name: QR_TapIn
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn QR_TapIn.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mysitedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
